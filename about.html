    <style>
        /* Brutalist Avantgarde System - KR Raw Concrete Theme */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Space+Grotesk:wght@400;700&display=swap');

        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2a2a2a;
            --text-primary: #f5f5f5;
            --text-secondary: #b0b0b0;
            --accent: #ff4d4d;
            --accent-hover: #cc0000;
            --border: #404040;
            --border-accent: #ff4d4d;
            --font-main: 'Noto Sans KR', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --shadow: 0 4px 6px rgba(0,0,0,0.4);
            --radius: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: color 0.2s;
        }

        a:hover {
            color: var(--accent-hover);
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header & Navigation */
        header {
            background: var(--bg-secondary);
            border-bottom: 3px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo a {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 900;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .logo a:hover {
            color: var(--accent);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        nav ul li a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        nav ul li a:hover,
        nav ul li a.active {
            color: var(--text-primary);
            border-bottom-color: var(--accent);
        }

        .hamburger-menu {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
            padding: 5px;
            background: none;
            border: none;
        }

        .hamburger-menu span {
            display: block;
            width: 28px;
            height: 3px;
            background: var(--text-primary);
            border-radius: 0;
            transition: all 0.3s;
        }

        /* Hero */
        .hero {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(145deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,77,77,0.03) 2px, rgba(255,77,77,0.03) 4px);
            pointer-events: none;
        }

        .hero h1 {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 1.2;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .hero h1 span {
            color: var(--accent);
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 700px;
            margin: 0 auto 30px;
            position: relative;
            z-index: 1;
        }

        .hero .cta-phone {
            display: inline-block;
            background: var(--accent);
            color: var(--bg-primary);
            padding: 15px 40px;
            font-weight: 900;
            font-size: 1.5rem;
            text-decoration: none;
            border: 3px solid var(--accent);
            transition: all 0.2s;
            position: relative;
            z-index: 1;
        }

        .hero .cta-phone:hover {
            background: transparent;
            color: var(--accent);
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 60px 20px;
        }

        .info-card {
            background: var(--bg-secondary);
            padding: 30px;
            border: 1px solid var(--border);
            transition: border-color 0.3s, transform 0.3s;
            position: relative;
        }

        .info-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
        }

        .info-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent);
        }

        .info-card h2 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .info-card p {
            color: var(--text-secondary);
            margin-bottom: 10px;
            line-height: 1.8;
        }

        .info-card ul {
            list-style: none;
            padding: 0;
        }

        .info-card ul li {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .info-card ul li::before {
            content: '› ';
            color: var(--accent);
            font-weight: 900;
        }

        .info-card .price-tag {
            display: inline-block;
            background: var(--accent);
            color: var(--bg-primary);
            padding: 5px 15px;
            font-weight: 900;
            font-size: 1.2rem;
            margin-top: 15px;
        }

        /* FAQ Section */
        .faq-section {
            padding: 60px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .faq-section h2 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .faq-item {
            max-width: 800px;
            margin: 0 auto 20px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
        }

        .faq-question {
            padding: 20px 25px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-primary);
            transition: background 0.2s;
            user-select: none;
        }

        .faq-question:hover {
            background: rgba(255,77,77,0.05);
        }

        .faq-question .icon {
            font-size: 1.5rem;
            transition: transform 0.3s;
        }

        .faq-question.active .icon {
            transform: rotate(45deg);
        }

        .faq-answer {
            padding: 0 25px 20px;
            display: none;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .faq-answer.open {
            display: block;
        }

        /* Footer */
        footer {
            background: var(--bg-secondary);
            padding: 40px 20px;
            text-align: center;
            border-top: 3px solid var(--accent);
            margin-top: auto;
        }

        footer p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        footer a {
            color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hamburger-menu {
                display: flex;
            }

            .hamburger-menu.active span:nth-child(1) {
                transform: rotate(45deg) translate(6px, 6px);
            }
            .hamburger-menu.active span:nth-child(2) {
                opacity: 0;
            }
            .hamburger-menu.active span:nth-child(3) {
                transform: rotate(-45deg) translate(6px, -6px);
            }

            nav ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: var(--bg-secondary);
                padding: 20px;
                border-bottom: 3px solid var(--accent);
                gap: 15px;
            }

            nav ul.open {
                display: flex;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .info-grid {
                grid-template-columns: 1fr;
                padding: 40px 20px;
            }

            .faq-section h2 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .header-inner {
                padding: 10px 15px;
            }
            .hero {
                padding: 40px 15px;
            }
            .hero h1 {
                font-size: 1.6rem;
            }
            .hero .cta-phone {
                font-size: 1.2rem;
                padding: 12px 30px;
            }
        }

        /* Utility */
        .text-accent {
            color: var(--accent);
        }
        .mt-20 {
            margin-top: 20px;
        }
        .mb-20 {
            margin-bottom: 20px;
        }
        .text-center {
            text-align: center;
        }
    </style>
</head>
